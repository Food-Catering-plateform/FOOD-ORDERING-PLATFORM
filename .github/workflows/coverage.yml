name: CI with Coverage

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests + Generate coverage
        env:
          CI: true
        run: npm run test:ci

      - name: 🔍 Debug Coverage Files
        run: |
          pwd
          ls -la
          echo "=== Coverage folder ==="
          ls -la coverage/ 2>/dev/null || echo "No coverage folder"
          echo "=== lcov.info ==="
          if [ -f coverage/lcov.info ]; then
            echo "✅ Found!"
            wc -l coverage/lcov.info
            head -n 20 coverage/lcov.info
          else
            echo "❌ NOT FOUND"
            echo "Looking for any coverage files..."
            find . -name "*coverage*" -o -name "*.lcov" -o -name "lcov.info" | head -10
          fi

      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: jest
          verbose: true
          fail_ci_if_error: false