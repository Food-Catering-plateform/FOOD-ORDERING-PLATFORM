name: CI with Coverage

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        env:
          CI: true
        run: npm run test:ci

      - name: 🔍 Debug - Check coverage files
        run: |
          echo "=== Files in coverage folder ==="
          ls -la coverage/ 2>/dev/null || echo "Coverage folder not found"
          
          echo "=== lcov.info status ==="
          if [ -f coverage/lcov.info ]; then
            echo "✅ SUCCESS: lcov.info found"
            echo "Size: $(wc -c < coverage/lcov.info) bytes"
            head -n 15 coverage/lcov.info
          else
            echo "❌ lcov.info NOT found"
            find . -name "*.info" -o -name "lcov*" | head -10
          fi

      - name: Upload to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: jest
          verbose: true
          fail_ci_if_error: false