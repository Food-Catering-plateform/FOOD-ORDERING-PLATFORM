name: CI with Coverage

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Clean old coverage artifacts
        run: |
          rm -rf coverage || true
          rm -rf coverage-analytics || true
          rm -rf coverage-vsidebar || true

      - name: Run tests with coverage
        continue-on-error: true
        run: CI=true npm test -- --coverage --watchAll=false

      - name: Inspect coverage output
        if: always()
        run: |
          echo "=== Checking coverage folder ==="
          if [ -d coverage ]; then
            find coverage -maxdepth 3 -type f | sort
            echo "=== lcov preview ==="
            head -20 coverage/lcov.info || true
          else
            echo "No coverage folder generated"
          fi

      - name: Normalize coverage timestamps
        if: always()
        run: |
          if [ -d coverage ]; then
            find coverage -type f -exec touch {} +
          fi

      - name: Upload coverage reports to Codecov
        if: always() && hashFiles('coverage/lcov.info') != ''
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          flags: jest
          verbose: true
          fail_ci_if_error: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
