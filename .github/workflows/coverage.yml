name: CI with Coverage

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Clean old coverage artifacts
        run: |
          rm -rf coverage || true
          rm -rf coverage-analytics || true
          rm -rf coverage-vsidebar || true

      - name: Run tests with coverage
        env:
          CI: true
        run: npm test -- --coverage --watchAll=false

      - name: Inspect generated coverage files
        run: |
          if [ -d coverage ]; then
            echo "Coverage directory contents:"
            find coverage -maxdepth 2 -type f | sort
            echo "First 20 lines of coverage/lcov.info:"
            head -20 coverage/lcov.info || true
          else
            echo "Coverage directory not found"
            exit 1
          fi

      - name: Normalize coverage timestamps
        run: |
          if [ -d coverage ]; then
            find coverage -type f -exec touch {} +
          fi

      - name: Touch coverage report before upload
        if: always()
        run: |
          if [ -f coverage/lcov.info ]; then
            touch coverage/lcov.info
          fi

      - name: Normalize LCOV path separators
        if: always()
        run: |
          if [ -f coverage/lcov.info ]; then
            python3 - <<'PY'
from pathlib import Path
path = Path('coverage/lcov.info')
text = path.read_text(encoding='utf-8')
path.write_text(text.replace('\\', '/'), encoding='utf-8')
PY
          fi

      - name: Verify normalized LCOV paths
        if: always()
        run: |
          if [ -f coverage/lcov.info ]; then
            echo 'First 20 SF entries after normalization:'
            grep -n '^SF:' coverage/lcov.info | head -20
          fi

      - name: Upload coverage reports to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          flags: jest
          verbose: true
          fail_ci_if_error: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
